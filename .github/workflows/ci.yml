name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test grammar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate parser artifacts
        run: pnpm generate

      - name: Run corpus tests
        run: pnpm test

      - name: Check Go parser artifact
        run: pnpm check:go-parser

      - name: Run Go binding tests
        run: go test ./bindings/go

      - name: Run binding tests
        run: pnpm test:binding

      - name: Parse examples
        run: pnpm parse:examples

      - name: Run query validation
        run: pnpm query:examples
